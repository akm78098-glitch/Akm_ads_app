<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AKM | Campaigns</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f3f4f6;color:#111827}
        .mobile-header{position:fixed;top:0;left:0;right:0;height:60px;background:linear-gradient(135deg,#1e1b4b,#0f172a);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100}
        .logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;background-clip:text;color:transparent}
        .menu-btn{background:rgba(255,255,255,0.1);border:none;width:44px;height:44px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer}
        .menu-dot{width:5px;height:5px;background:white;border-radius:50%}
        .sidebar-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:199;opacity:0;visibility:hidden;transition:all 0.3s ease}
        .sidebar-overlay.active{opacity:1;visibility:visible}
        .sidebar{position:fixed;top:0;right:-280px;width:280px;height:100%;background:linear-gradient(180deg,#1e1b4b 0%,#0f172a 100%);z-index:200;transition:right 0.3s ease}
        .sidebar.active{right:0}
        .sidebar-header{padding:28px 24px;border-bottom:1px solid rgba(255,255,255,0.1)}
        .sidebar-header .logo{font-size:22px;margin-bottom:8px}
        .sidebar-header p{font-size:12px;color:rgba(255,255,255,0.5)}
        .sidebar-nav{padding:20px 16px}
        .nav-item{display:flex;align-items:center;gap:14px;padding:14px 16px;margin-bottom:8px;color:rgba(255,255,255,0.7);text-decoration:none;font-size:15px;font-weight:500;border-radius:12px}
        .nav-item.active{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white}
        .sidebar-footer{position:absolute;bottom:0;left:0;right:0;padding:20px 24px;border-top:1px solid rgba(255,255,255,0.1)}
        .user-info{font-size:12px;color:rgba(255,255,255,0.6)}
        .main-content{padding:80px 20px 40px;max-width:600px;margin:0 auto}
        .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .section-header h3{font-size:18px;font-weight:600}
        .btn-primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;padding:12px 20px;border-radius:12px;font-weight:600;cursor:pointer}
        .btn-secondary{background:#f3f4f6;color:#4b5563;border:none;padding:10px 16px;border-radius:10px;cursor:pointer}
        .campaigns-list{display:flex;flex-direction:column;gap:16px}
        .campaign-card{background:white;border-radius:20px;padding:20px}
        .campaign-card strong{font-size:16px;display:block;margin-bottom:8px}
        .progress-bar{background:#e5e7eb;border-radius:10px;height:8px;margin:12px 0;overflow:hidden}
        .progress-fill{background:linear-gradient(90deg,#4f46e5,#7c3aed);height:100%;border-radius:10px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center}
        .modal.active{display:flex}
        .modal-content{background:white;border-radius:28px;padding:24px;width:90%;max-width:400px}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .modal-header h2{font-size:20px}
        .modal-close{background:none;border:none;font-size:24px;cursor:pointer}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
        .form-row{display:flex;gap:16px}
        .form-row .form-group{flex:1}
        input,select,textarea{width:100%;padding:12px;border:1px solid #e5e7eb;border-radius:12px}
        .modal-footer{display:flex;gap:12px;justify-content:flex-end;margin-top:20px}
        .loading{text-align:center;padding:40px;color:#9ca3af}
        @media(min-width:768px){.mobile-header{display:none}.sidebar{left:0;right:auto}.sidebar-overlay{display:none}.main-content{margin-left:280px;max-width:none;padding:40px}}
    </style>
</head>
<body>
    <div class="mobile-header">
        <div class="logo">AKM Ads Market</div>
        <button class="menu-btn" id="menuToggle">
            <span class="menu-dot"></span><span class="menu-dot"></span><span class="menu-dot"></span>
        </button>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="logo">AKM Ads Market</div><p>Premium Platform</p></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
            <a href="marketplace.html" class="nav-item">🔍 Marketplace</a>
            <a href="campaigns.html" class="nav-item active">📈 Campaigns</a>
            <a href="wallet.html" class="nav-item">💰 Wallet</a>
        </nav>
        <div class="sidebar-footer"><div class="user-info" id="userInfo">Loading...</div></div>
    </aside>
    <main class="main-content">
        <div class="section-header"><h3>Your Campaigns</h3><button class="btn-primary" id="createCampaignBtn">+ Create Campaign</button></div>
        <div class="campaigns-list" id="campaignsList"><div class="loading">Loading campaigns...</div></div>
    </main>
    <div class="modal" id="campaignModal"><div class="modal-content"><div class="modal-header"><h2>Create Campaign</h2><button class="modal-close" id="closeModal">&times;</button></div><div class="form-group"><label>Title</label><input type="text" id="campaignTitle" placeholder="e.g., Summer Sale 2024"></div><div class="form-group"><label>Description</label><textarea id="campaignDesc" rows="3" placeholder="Describe your product"></textarea></div><div class="form-row"><div class="form-group"><label>Category</label><select id="campaignCategory"><option value="Tech">Technology</option><option value="News">News</option><option value="Gaming">Gaming</option><option value="Business">Business</option></select></div><div class="form-group"><label>Budget ($)</label><input type="number" id="campaignBudget" placeholder="Min $50"></div></div><div class="form-row"><div class="form-group"><label>Price Per Post</label><input type="number" id="campaignPrice" placeholder="Amount per channel"></div><div class="form-group"><label>Min Subscribers</label><input type="number" id="campaignMinSubs" value="0"></div></div><div class="modal-footer"><button class="btn-secondary" id="cancelModal">Cancel</button><button class="btn-primary" id="submitCampaign">Create</button></div></div></div>
    <script>
        (function() {
            const menuBtn = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            function openMenu() { sidebar.classList.add('active'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
            function closeMenu() { sidebar.classList.remove('active'); overlay.classList.remove('active'); document.body.style.overflow = ''; }
            if (menuBtn) { menuBtn.addEventListener('click', function(e) { e.stopPropagation(); if (sidebar.classList.contains('active')) { closeMenu(); } else { openMenu(); } }); }
            if (overlay) { overlay.addEventListener('click', closeMenu); }
        })();

        const API_BASE = 'https://akm-ads-bot.onrender.com';
        let currentUser = null;

        async function loadUser() {
            const stored = localStorage.getItem('akm_user');
            if (!stored) { window.location.href = 'index.html'; return null; }
            currentUser = JSON.parse(stored);
            document.getElementById('userInfo').innerHTML = `${currentUser.username || 'User'}<br><small>${currentUser.user_type || ''}</small>`;
            return currentUser;
        }

        async function loadCampaigns() {
            await loadUser();
            const c = document.getElementById('campaignsList');
            if (!c) return;
            if (currentUser?.user_type !== 'advertiser') { c.innerHTML = '<div class="loading">Only advertisers can create campaigns</div>'; return; }
            try {
                const res = await fetch(`${API_BASE}/api/campaigns/advertiser/${currentUser.id}`);
                const campaigns = await res.json();
                if (!campaigns || campaigns.length === 0) { c.innerHTML = '<div class="loading">No campaigns yet. Click Create Campaign to start</div>'; return; }
                let html = '';
                for (const camp of campaigns) {
                    const orders = await (await fetch(`${API_BASE}/api/orders/campaign/${camp.id}`)).json();
                    const completed = (orders || []).filter(o => o.status === 'released').length;
                    const progress = orders.length ? Math.round((completed / orders.length) * 100) : 0;
                    html += `<div class="campaign-card"><strong>${camp.title}</strong><p style="color:#6b7280;margin:8px 0">${(camp.description || '').substring(0, 100)}...</p><div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div><div style="display:flex;justify-content:space-between"><span>Budget: $${camp.budget}</span><span>Progress: ${progress}%</span></div><button class="btn-secondary" style="margin-top:12px" onclick="alert('Orders: ' + ${orders.length})">View Orders</button></div>`;
                }
                c.innerHTML = html;
            } catch(e) { c.innerHTML = '<div class="loading">Error loading campaigns</div>'; }
        }

        function showCreateModal() { document.getElementById('campaignModal').classList.add('active'); }
        function closeModal() { document.getElementById('campaignModal').classList.remove('active'); }
        async function createCampaign() {
            const data = { advertiser_id: currentUser.id, title: document.getElementById('campaignTitle').value, description: document.getElementById('campaignDesc').value, category: document.getElementById('campaignCategory').value, budget: parseFloat(document.getElementById('campaignBudget').value), price_per_post: parseFloat(document.getElementById('campaignPrice').value), target_subscribers_min: parseInt(document.getElementById('campaignMinSubs').value || 0) };
            if (!data.title) { alert('Enter title'); return; }
            if (data.budget < 50) { alert('Minimum budget $50'); return; }
            if (data.price_per_post > data.budget) { alert('Price per post cannot exceed budget'); return; }
            try { await fetch(`${API_BASE}/api/campaigns`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); alert('Campaign created!'); closeModal(); loadCampaigns(); } catch(e) { alert('Error: ' + e.message); }
        }

        document.getElementById('createCampaignBtn')?.addEventListener('click', showCreateModal);
        document.getElementById('submitCampaign')?.addEventListener('click', createCampaign);
        document.getElementById('closeModal')?.addEventListener('click', closeModal);
        document.getElementById('cancelModal')?.addEventListener('click', closeModal);
        loadCampaigns();
    </script>
</body>
</html>
