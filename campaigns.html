<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AKM | Campaigns</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="mobile-header">
            <div class="logo">AKM Ads Market</div>
            <button class="menu-btn" id="menuToggle">
                <span class="menu-dot"></span>
                <span class="menu-dot"></span>
                <span class="menu-dot"></span>
            </button>
        </div>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">AKM Ads Market</div>
                <p>Premium Advertising Platform</p>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="marketplace.html" class="nav-item">🔍 Marketplace</a>
                <a href="campaigns.html" class="nav-item active">📈 Campaigns</a>
                <a href="wallet.html" class="nav-item">💰 Wallet</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">Loading...</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="section-header">
                <h3>Your Campaigns</h3>
                <button class="btn-primary" id="createCampaignBtn">+ Create Campaign</button>
            </div>

            <div class="campaigns-list" id="campaignsList">
                <div class="loading">Loading campaigns...</div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="campaignModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Campaign</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="form-group">
                <label>Campaign Title</label>
                <input type="text" id="campaignTitle" placeholder="e.g., Summer Sale 2024">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="campaignDesc" rows="3" placeholder="Describe your product or service"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Category</label>
                    <select id="campaignCategory">
                        <option value="Tech">Technology</option>
                        <option value="News">News</option>
                        <option value="Gaming">Gaming</option>
                        <option value="Business">Business</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Budget (USD)</label>
                    <input type="number" id="campaignBudget" placeholder="Minimum $50">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Price Per Post</label>
                    <input type="number" id="campaignPrice" placeholder="Amount per channel">
                </div>
                <div class="form-group">
                    <label>Min Subscribers</label>
                    <input type="number" id="campaignMinSubs" value="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelModal">Cancel</button>
                <button class="btn-primary" id="submitCampaign">Create Campaign</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
