<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKM | Campaigns</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="logo">AKM Ads Market</div></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="marketplace.html" class="nav-item">🔍 Marketplace</a>
                <a href="campaigns.html" class="nav-item active">📈 Campaigns</a>
                <a href="wallet.html" class="nav-item">💰 Wallet</a>
            </nav>
            <div class="sidebar-footer"><div class="user-info" id="userInfo">Loading...</div></div>
        </aside>
        <main class="main-content">
            <header class="content-header">
                <div class="header-title"><h1>Campaign Management</h1><p>Create and monitor your campaigns</p></div>
                <button class="btn-primary" id="createCampaignBtn">+ New Campaign</button>
            </header>
            <div class="campaigns-list" id="campaignsList"><div class="campaign-card">Loading campaigns...</div></div>
        </main>
    </div>

    <div class="modal" id="campaignModal">
        <div class="modal-content">
            <div class="modal-header"><h2>Create Campaign</h2><button class="modal-close" id="closeModal">&times;</button></div>
            <div class="form-group"><label>Title</label><input type="text" id="campaignTitle" placeholder="e.g., Summer Sale 2024"></div>
            <div class="form-group"><label>Description</label><textarea id="campaignDesc" rows="3" placeholder="Describe your product/service"></textarea></div>
            <div class="form-row">
                <div class="form-group"><label>Category</label><select id="campaignCategory"><option value="Tech">Technology</option><option value="News">News</option><option value="Gaming">Gaming</option><option value="Business">Business</option><option value="Crypto">Crypto</option><option value="Sports">Sports</option></select></div>
                <div class="form-group"><label>Budget ($)</label><input type="number" id="campaignBudget" placeholder="Minimum $50"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Price per post ($)</label><input type="number" id="campaignPrice" placeholder="Price per channel"></div>
                <div class="form-group"><label>Min subscribers</label><input type="number" id="campaignMinSubs" value="0" placeholder="0 = no minimum"></div>
            </div>
            <div class="modal-footer"><button class="btn-secondary" id="cancelModal">Cancel</button><button class="btn-primary" id="submitCampaign">Create Campaign</button></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
