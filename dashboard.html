<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKM | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#f3f4f6;color:#111827}
        .dashboard-container{display:flex;min-height:100vh}
        .sidebar{width:280px;background:#111827;color:#fff;position:fixed;height:100vh}
        .sidebar-header{padding:28px 24px;border-bottom:1px solid rgba(255,255,255,0.1)}
        .logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;background-clip:text;color:transparent}
        .nav-item{display:flex;padding:14px 24px;color:rgba(255,255,255,0.7);text-decoration:none;gap:12px;font-size:14px;font-weight:500}
        .nav-item:hover,.nav-item.active{background:rgba(255,255,255,0.08);color:#fff}
        .main-content{flex:1;margin-left:280px;padding:32px 48px}
        .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:32px}
        .stat-card{background:#fff;border-radius:16px;padding:24px;border:1px solid #e5e7eb}
        .stat-label{font-size:13px;color:#6b7280;text-transform:uppercase;margin-bottom:8px}
        .stat-value{font-size:32px;font-weight:700;color:#111827}
        .btn-primary{background:#4f46e5;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-weight:600}
        .btn-secondary{background:#e2e8f0;color:#333;border:none;padding:10px 20px;border-radius:8px;cursor:pointer}
        .activity-section{background:#fff;border-radius:16px;border:1px solid #e5e7eb;overflow:hidden}
        .section-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid #e5e7eb}
        .section-header h2{font-size:18px;font-weight:600}
        .text-link{background:none;border:none;color:#4f46e5;cursor:pointer}
        .activity-item{padding:16px 24px;border-bottom:1px solid #e5e7eb}
        .user-info{position:absolute;bottom:24px;left:24px;right:24px;padding-top:16px;border-top:1px solid #374151;font-size:12px;color:#9ca3af}
        .content-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
        .header-title h1{font-size:28px;margin-bottom:8px}
        .header-title p{color:#6b7280}
        @media(max-width:768px){.sidebar{transform:translateX(-100%)}.main-content{margin-left:0;padding:20px}}
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">AKM Ads Market</div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">📊 Dashboard</a>
                <a href="marketplace.html" class="nav-item">🔍 Marketplace</a>
                <a href="campaigns.html" class="nav-item">📈 Campaigns</a>
                <a href="wallet.html" class="nav-item">💰 Wallet</a>
            </nav>
            <div class="user-info" id="userInfo">Loading...</div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div class="header-title">
                    <h1>Dashboard</h1>
                    <p>Welcome back, <span id="userName">User</span></p>
                </div>
                <button class="btn-secondary" onclick="location.reload()">🔄 Refresh</button>
            </header>

            <div class="kpi-grid" id="statsGrid">
                <div class="stat-card"><div class="stat-label">Balance</div><div class="stat-value" id="balanceDisplay">$0.00</div></div>
                <div class="stat-card"><div class="stat-label">Active Campaigns</div><div class="stat-value" id="campaignCount">0</div></div>
                <div class="stat-card"><div class="stat-label">Total Spent</div><div class="stat-value" id="totalSpent">$0.00</div></div>
                <div class="stat-card"><div class="stat-label">Pending Orders</div><div class="stat-value" id="pendingOrders">0</div></div>
            </div>

            <div class="activity-section">
                <div class="section-header">
                    <h2>Recent Activity</h2>
                    <button class="text-link" onclick="alert('View all feature coming soon')">View All</button>
                </div>
                <div class="activity-list" id="activityList">
                    <div class="activity-item">No recent activity</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'https://akm-ads-bot.onrender.com';
        let currentUser = null;

        async function loadUser() {
            const stored = localStorage.getItem('akm_user');
            if (!stored) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(stored);
            document.getElementById('userInfo').innerHTML = `${currentUser.username || 'User'}<br>${currentUser.user_type || ''}`;
            document.getElementById('userName').innerText = currentUser.username || 'User';
            return currentUser;
        }

        async function loadDashboard() {
            await loadUser();
            if (!currentUser) return;

            try {
                if (currentUser.user_type === 'advertiser') {
                    const res = await fetch(`${API_BASE}/api/campaigns/advertiser/${currentUser.id}`);
                    const campaigns = await res.json();
                    document.getElementById('balanceDisplay').innerText = `$${(currentUser.balance || 0).toFixed(2)}`;
                    document.getElementById('campaignCount').innerText = (campaigns || []).filter(c => c.is_active).length;
                    document.getElementById('totalSpent').innerText = `$${(campaigns || []).reduce((s, c) => s + (c.budget || 0), 0).toFixed(2)}`;
                    document.getElementById('pendingOrders').innerText = '0';
                } else {
                    document.getElementById('balanceDisplay').innerText = `$${(currentUser.balance || 0).toFixed(2)}`;
                    document.getElementById('campaignCount').innerText = '0';
                    document.getElementById('totalSpent').innerText = '$0.00';
                    document.getElementById('pendingOrders').innerText = '0';
                }
            } catch(e) {
                console.error('Error:', e);
                document.getElementById('activityList').innerHTML = '<div class="activity-item">Backend connection error. Make sure backend is running.</div>';
            }
        }

        loadDashboard();
    </script>
</body>
</html>
