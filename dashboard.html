<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AKM | Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Mobile Header with 3-Dot Menu -->
        <div class="mobile-header">
            <div class="logo">AKM Ads Market</div>
            <button class="menu-btn" id="menuToggle">
                <span class="menu-dot"></span>
                <span class="menu-dot"></span>
                <span class="menu-dot"></span>
            </button>
        </div>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">AKM Ads Market</div>
                <p>Premium Advertising Platform</p>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="marketplace.html" class="nav-item">
                    <span class="nav-icon">🔍</span>
                    <span>Marketplace</span>
                </a>
                <a href="campaigns.html" class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span>Campaigns</span>
                </a>
                <a href="wallet.html" class="nav-item">
                    <span class="nav-icon">💰</span>
                    <span>Wallet</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">Loading...</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="welcome-card">
                <h2>Welcome back, <span id="userName">User</span></h2>
                <p>Manage your advertising campaigns and track performance</p>
            </div>

            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-label">Balance</div>
                    <div class="stat-value" id="balanceVal">$0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Active Campaigns</div>
                    <div class="stat-value" id="campaignsVal">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Spent</div>
                    <div class="stat-value" id="spentVal">$0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pending Orders</div>
                    <div class="stat-value" id="pendingVal">0</div>
                </div>
            </div>

            <div class="section-header">
                <h3>Recent Activity</h3>
                <button class="text-link" onclick="alert('All activity feature coming soon')">View All</button>
            </div>
            <div class="activity-list" id="activityList">
                <div class="activity-item">No recent activity</div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
