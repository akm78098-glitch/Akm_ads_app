<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKM | Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="logo">AKM Ads Market</div></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="marketplace.html" class="nav-item active">🔍 Marketplace</a>
                <a href="campaigns.html" class="nav-item">📈 Campaigns</a>
                <a href="wallet.html" class="nav-item">💰 Wallet</a>
            </nav>
            <div class="sidebar-footer"><div class="user-info" id="userInfo">Loading...</div></div>
        </aside>
        <main class="main-content">
            <header class="content-header">
                <div class="header-title"><h1>Channel Marketplace</h1><p>Discover premium channels for your campaigns</p></div>
                <div class="header-actions">
                    <select id="categoryFilter" class="filter-select" onchange="filterChannels()">
                        <option value="">All Categories</option>
                        <option value="Tech">Technology</option>
                        <option value="News">News</option>
                        <option value="Gaming">Gaming</option>
                        <option value="Business">Business</option>
                        <option value="Crypto">Crypto</option>
                        <option value="Sports">Sports</option>
                    </select>
                </div>
            </header>
            <div class="channels-grid" id="channelsGrid"><div class="channel-card">Loading channels...</div></div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
