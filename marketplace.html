<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AKM | Marketplace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="mobile-header">
            <div class="logo">AKM Ads Market</div>
            <button class="menu-btn" id="menuToggle">
                <span class="menu-dot"></span>
                <span class="menu-dot"></span>
                <span class="menu-dot"></span>
            </button>
        </div>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">AKM Ads Market</div>
                <p>Premium Advertising Platform</p>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="marketplace.html" class="nav-item active">🔍 Marketplace</a>
                <a href="campaigns.html" class="nav-item">📈 Campaigns</a>
                <a href="wallet.html" class="nav-item">💰 Wallet</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">Loading...</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="welcome-card">
                <h2>Channel Marketplace</h2>
                <p>Discover premium channels for your campaigns</p>
            </div>

            <div class="filter-section">
                <select id="categoryFilter" class="filter-select" onchange="filterChannels()">
                    <option value="">All Categories</option>
                    <option value="Tech">Technology</option>
                    <option value="News">News</option>
                    <option value="Gaming">Gaming</option>
                    <option value="Business">Business</option>
                    <option value="Crypto">Crypto</option>
                </select>
            </div>

            <div class="channels-grid" id="channelsGrid">
                <div class="loading">Loading channels...</div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
