<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKM | Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="logo">AKM Ads Market</div></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="marketplace.html" class="nav-item">🔍 Marketplace</a>
                <a href="campaigns.html" class="nav-item">📈 Campaigns</a>
                <a href="wallet.html" class="nav-item active">💰 Wallet</a>
            </nav>
            <div class="sidebar-footer"><div class="user-info" id="userInfo">Loading...</div></div>
        </aside>
        <main class="main-content">
            <header class="content-header">
                <div class="header-title"><h1>Wallet</h1><p>Manage your funds and transactions</p></div>
                <button class="btn-primary" id="addFundsBtn">+ Add Funds</button>
            </header>
            <div class="balance-card"><div class="balance-amount" id="balanceAmount">$0.00</div><div>100% protected by escrow</div></div>
            <div class="tabs">
                <button class="tab active" data-tab="orders">Active Orders</button>
                <button class="tab" data-tab="history">Transaction History</button>
            </div>
            <div class="tab-content active" id="ordersTab"><div class="activity-list" id="ordersList"><div class="activity-item">No active orders</div></div></div>
            <div class="tab-content" id="historyTab"><div class="activity-list" id="historyList"><div class="activity-item">No transaction history</div></div></div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
