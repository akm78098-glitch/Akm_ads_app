<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AKM | Wallet</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="mobile-header">
            <div class="logo">AKM Ads Market</div>
            <button class="menu-btn" id="menuToggle">
                <span class="menu-dot"></span>
                <span class="menu-dot"></span>
                <span class="menu-dot"></span>
            </button>
        </div>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">AKM Ads Market</div>
                <p>Premium Advertising Platform</p>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="marketplace.html" class="nav-item">🔍 Marketplace</a>
                <a href="campaigns.html" class="nav-item">📈 Campaigns</a>
                <a href="wallet.html" class="nav-item active">💰 Wallet</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">Loading...</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="balance-card">
                <div class="balance-label">Available Balance</div>
                <div class="balance-amount" id="balanceAmount">$0.00</div>
                <div style="font-size: 12px; opacity: 0.8;">Protected by escrow</div>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="orders">Active Orders</button>
                <button class="tab" data-tab="history">Transaction History</button>
            </div>

            <div class="tab-content active" id="ordersTab">
                <div class="activity-list" id="ordersList">
                    <div class="activity-item">No active orders</div>
                </div>
            </div>

            <div class="tab-content" id="historyTab">
                <div class="activity-list" id="historyList">
                    <div class="activity-item">No transaction history</div>
                </div>
            </div>

            <button class="btn-primary" id="addFundsBtn" style="width: 100%; margin-top: 20px;">Add Funds</button>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
